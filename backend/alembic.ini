# Alembic — archivo de configuración principal
# Migraciones para LBAMonitor (SQLite + PostgreSQL async)

[alembic]
# Ruta al directorio de migraciones
script_location = alembic

# Template para nuevos archivos de migración
script_py.template = alembic/script.py.mako

# Path de la BD (sobreescribible por env var o código)
# Para SQLite: sqlite+aiosqlite:///path/to/db
# Para PostgreSQL: postgresql+asyncpg://user:pass@host/db
sqlalchemy.url =

# Timezone para timestamps de migraciones
timezone = UTC

# Output format del log
output_encoding = utf-8

# Comportamiento: si la BD no tiene tabla alembic_version, crearla
# (necesario para primera instalación)
recursive_version_locations = true

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
