# ───────── LBAMonitor CI/CD v4.3 ─────────
name: CI

on:
  push:
    branches: [main, develop, "v4.*"]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        working-directory: backend
        run: ruff check lbamonitor/ tests/

      - name: Type check with mypy
        working-directory: backend
        run: mypy lbamonitor/ --ignore-missing-imports || true

      - name: Security check with bandit
        working-directory: backend
        run: bandit -r lbamonitor/ -ll || true

      - name: Check deps for known CVEs
        working-directory: backend
        run: safety check --ignore 70612 || true

      - name: Run tests with pytest
        working-directory: backend
        env:
          LBAMONITOR_ENV: test
          PYTEST_CURRENT_TEST: 1
        run: pytest tests/ -v --cov=lbamonitor --cov-report=xml --cov-report=term

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Build frontend
        working-directory: frontend
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: lbamonitor-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
